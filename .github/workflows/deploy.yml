name: Deploy to GitHub Pages

on:
  push:
    branches: [main]   # triggers on every push to main

# Required permissions for the official Pages deployment actions
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time; cancel any in-progress run
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist   # Vite outputs to dist/ by default

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
